name: Send Newsletter (Work)

on:
  schedule:
    # Run Monday-Friday at 9 AM EST (14:00 UTC) / 10 AM EDT
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass 2-hour dedup guard'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check for duplicate run (skip if already sent in last 2 hours)
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const forceSend = '${{ inputs.force_send }}' === 'true';
            if (forceSend) {
              core.setOutput('skip', 'false');
              console.log('Force send enabled — bypassing dedup check');
              return;
            }
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'send-newsletter-work.yml',
              status: 'success',
              per_page: 1
            });
            if (runs.data.workflow_runs.length > 0) {
              const lastRun = new Date(runs.data.workflow_runs[0].created_at);
              const hoursAgo = (Date.now() - lastRun.getTime()) / (1000 * 60 * 60);
              if (hoursAgo < 2 && runs.data.workflow_runs[0].id !== context.runId) {
                core.setOutput('skip', 'true');
                console.log(`Skipping — last successful run was ${hoursAgo.toFixed(1)} hours ago`);
                return;
              }
            }
            core.setOutput('skip', 'false');

      - name: Checkout repository
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip notice
        if: steps.dedup.outputs.skip == 'true'
        run: echo "⏭️ Newsletter already sent in the last 2 hours — skipping to avoid duplicate."

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install

      - name: Build fresh RSS data (no scrapers — they run separately at 3 PM EST)
        if: steps.dedup.outputs.skip != 'true'
        run: npm run build
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL: ${{ vars.CEREBRAS_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SKIP_SCRAPERS: 'true'
        timeout-minutes: 10

      - name: Send Work Newsletter Email
        if: steps.dedup.outputs.skip != 'true'
        env:
          # Primary: Power Automate Webhook (corporate O365 email)
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Fallback: SMTP (only used if webhook not configured)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          # AI description generation
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL: ${{ vars.CEREBRAS_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          echo "📧 Sending Work daily briefing (boss preferred format)..."
          echo "To: $EMAIL_TO"
          if [ -n "$WEBHOOK_URL" ]; then
            echo "📌 Using Power Automate Webhook (corporate O365)"
          else
            echo "📌 Using SMTP fallback"
          fi
          npx tsx rssfeed.ts --send-newsletter-work

      - name: Commit updated articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Only commit sent-articles.json and feed data — the critical dedup state
          git add docs/sent-articles.json docs/feed.json docs/rss.xml docs/raw-feed.json docs/feed-health.json docs/included-articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Work Newsletter sent - $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry push up to 3 times with rebase to handle race with update-articles
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              echo "Push failed (attempt $i), pulling with rebase..."
              git fetch origin main
              # On conflict, prefer our version of sent-articles.json (critical dedup state)
              git rebase origin/main --strategy-option=ours || {
                echo "Rebase failed, aborting and retrying with merge..."
                git rebase --abort
                git pull --no-rebase -X ours || true
              }
            done
          fi

      - name: Report Success
        if: success() && steps.dedup.outputs.skip != 'true'
        run: |
          echo "✅ Work newsletter sent successfully!"
          echo "📊 Check email inbox for delivery"

      - name: Report Failure
        if: failure() && steps.dedup.outputs.skip != 'true'
        run: |
          echo "❌ Work newsletter send failed!"
          echo "Check the logs above for error details"

      # Send failure alert email so someone knows to check
      - name: Send failure alert
        if: failure() && steps.dedup.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"to\":\"$EMAIL_TO\",\"subject\":\"[ALERT] Newsletter failed - $(date -u +'%Y-%m-%d')\",\"body\":\"<p>The daily newsletter workflow failed. Auto-retry is in progress.</p><p><a href='$RUN_URL'>View workflow run</a></p>\",\"apiKey\":\"$WEBHOOK_SECRET\"}" \
              && echo "Alert email sent" || echo "Alert send failed"
          fi

      # Auto-retry: wait, then trigger a retry run
      # Retry 1: wait 30 min (give Cerebras rate limits time to clear)
      # Retry 2: wait 60 min
      # Retry 3: wait 60 min (last attempt ~2.5 hours after original 9 AM)
      # The dedup check will prevent double-sends if a previous retry already succeeded
      - name: Schedule retry on failure
        if: failure() && steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Check how many times we've already retried today
            const now = new Date();
            const todayStart = new Date(now);
            todayStart.setUTCHours(0, 0, 0, 0);

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'send-newsletter-work.yml',
              created: `>=${todayStart.toISOString().split('T')[0]}`,
              per_page: 20
            });

            const todayRuns = runs.data.workflow_runs.length;
            const maxRetries = 3;

            if (todayRuns >= maxRetries + 1) {
              console.log(`Already ${todayRuns} runs today (max ${maxRetries} retries). Giving up.`);
              core.warning(`Newsletter failed after ${maxRetries} retries today. Manual intervention needed.`);
              return;
            }

            // Check if any run today succeeded (no need to retry)
            const successToday = runs.data.workflow_runs.some(r => r.conclusion === 'success');
            if (successToday) {
              console.log('A previous run today already succeeded — no retry needed.');
              return;
            }

            // Staggered delay: 30 min for first retry, 60 min for subsequent
            const retryNumber = todayRuns; // 1 = first retry, 2 = second, etc.
            const delayMinutes = retryNumber === 1 ? 30 : 60;
            console.log(`Retry ${retryNumber}/${maxRetries} — waiting ${delayMinutes} minutes before retrying...`);

            // Sleep before dispatching (GitHub Actions allows up to 6 hours per job)
            await new Promise(resolve => setTimeout(resolve, delayMinutes * 60 * 1000));

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'send-newsletter-work.yml',
              ref: 'main',
              inputs: { force_send: 'true' }
            });

            console.log(`✅ Retry dispatched after ${delayMinutes}min wait. Newsletter will be re-attempted now.`);
