name: Newsletter Watchdog

on:
  schedule:
    # Run Monday-Friday at 11 AM EST (15:00 UTC) — 1 hour after newsletter should have fired
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  actions: write

jobs:
  check-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check if newsletter ran today
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const todayStart = new Date(now);
            todayStart.setUTCHours(0, 0, 0, 0);

            // Check all newsletter runs today
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'newsletter-pipeline.yml',
              created: `>=${todayStart.toISOString().split('T')[0]}`,
              per_page: 10
            });

            const todayRuns = runs.data.workflow_runs;
            const successToday = todayRuns.some(r => r.conclusion === 'success');
            const inProgress = todayRuns.some(r => r.status === 'in_progress' || r.status === 'queued');

            if (successToday) {
              console.log('✅ Newsletter already sent successfully today. No action needed.');
              return;
            }

            if (inProgress) {
              console.log('⏳ Newsletter is currently running. No action needed.');
              return;
            }

            // Check if the workflow is even enabled
            const workflow = await github.rest.actions.getWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'send-newsletter-work.yml'
            });

            if (workflow.data.state !== 'active') {
              console.log('⚠️ Newsletter workflow is disabled. Enabling and triggering...');
              await github.rest.actions.enableWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'send-newsletter-work.yml'
              });
            }

            // Newsletter didn't run today — trigger it
            console.log(`🚨 Newsletter did not run today! (${todayRuns.length} runs, none successful)`);
            console.log('Triggering newsletter send...');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'newsletter-pipeline.yml',
              ref: 'main',
              inputs: { force_send: 'true' }
            });

            console.log('✅ Newsletter triggered by watchdog.');
            core.warning('Newsletter missed its scheduled run. Watchdog triggered it.');
