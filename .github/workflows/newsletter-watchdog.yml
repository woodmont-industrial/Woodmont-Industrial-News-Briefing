name: Newsletter Watchdog

on:
  # SCHEDULE DISABLED 2026-05-04 — sends are paused, watchdog has nothing to check.
  # schedule:
  #   - cron: '30 12 * * 1-5'
  #   - cron: '0 13 * * 1-5'
  #   - cron: '30 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  actions: write

jobs:
  check-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check if newsletter ran today
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const todayStart = new Date(now);
            todayStart.setUTCHours(0, 0, 0, 0);

            // Check sent-articles.json — the source of truth
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/sent-articles.json'
              });
              const content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
              const today = new Date().toISOString().split('T')[0];
              const sentToday = (content.sent || []).some(s => s.sentAt === today);
              if (sentToday) {
                console.log('✅ Newsletter already sent today (confirmed in sent-articles.json).');
                return;
              }
            } catch (e) {
              console.log('Could not check sent-articles.json: ' + e.message);
            }

            // Also check if send-only workflow is in progress
            try {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'send-only.yml',
                created: `>=${todayStart.toISOString().split('T')[0]}`,
                per_page: 5
              });
              const inProgress = runs.data.workflow_runs.some(r => r.status === 'in_progress');
              if (inProgress) {
                console.log('⏳ Send workflow is currently running. No action needed.');
                return;
              }
            } catch { /* workflow might not exist */ }

            // Newsletter didn't send today — ALERT ONLY
            console.log('🚨 Newsletter did NOT send today!');
            core.warning('Newsletter did NOT send today. Please trigger send-only.yml manually.');
