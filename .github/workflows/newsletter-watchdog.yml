name: Newsletter Watchdog

on:
  schedule:
    # Check at 8:30 AM EST (12:30 UTC) — pipeline should be done by now
    - cron: '30 12 * * 1-5'
    # Check again at 9:00 AM EST (13:00 UTC)
    - cron: '0 13 * * 1-5'
    # Final check at 9:30 AM EST (13:30 UTC) — last resort before boss arrives
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  actions: write

jobs:
  check-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check if newsletter ran today
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const todayStart = new Date(now);
            todayStart.setUTCHours(0, 0, 0, 0);

            // Check all newsletter runs today
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'newsletter-pipeline.yml',
              created: `>=${todayStart.toISOString().split('T')[0]}`,
              per_page: 10
            });

            const todayRuns = runs.data.workflow_runs;
            const successToday = todayRuns.some(r => r.conclusion === 'success');
            const inProgress = todayRuns.some(r => r.status === 'in_progress' || r.status === 'queued');

            if (successToday) {
              console.log('✅ Newsletter already sent successfully today. No action needed.');
              return;
            }

            if (inProgress) {
              console.log('⏳ Newsletter is currently running. No action needed.');
              return;
            }

            // Newsletter didn't run today — ALERT ONLY, do NOT auto-trigger
            // Auto-triggering caused double-sends. Manual intervention is safer.
            console.log(`🚨 Newsletter did not run today! (${todayRuns.length} runs, none successful)`);
            core.warning('Newsletter did NOT send today. Please trigger manually via workflow_dispatch.');
