name: Update Scoring Weights (Groq Learning)

on:
  schedule:
    # Run weekly on Friday at 1 PM EST (18:00 UTC) — after the weekly newsletter
    - cron: '0 18 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn-preferences:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Groq learning loop
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx tsx src/server/learn-preferences.ts

      - name: Commit updated scoring weights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/scoring-weights.json
          if git diff --staged --quiet; then
            echo "No changes to scoring weights"
          else
            git commit -m "Update scoring weights from feedback learning"
            git push
          fi
