name: Update Articles and Deploy

on:
  # Weekday RSS now handled by newsletter-pipeline.yml
  # This only runs on weekends + manual trigger
  schedule:
    - cron: '0 15 * * 0,6'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install --prefer-offline --no-audit

    - name: Build RSS feeds with AI classification (no scrapers)
      run: |
        echo "📰 Starting RSS-only feed build (scrapers run separately at 3 PM EST)..."
        npm run build-static
        echo "✅ RSS build completed"
      env:
        NODE_ENV: production
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        CEREBRAS_MODEL: ${{ vars.CEREBRAS_MODEL }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        SKIP_SCRAPERS: 'true'
      timeout-minutes: 15
    
    - name: Verify build output
      run: |
        echo "📂 Checking docs/ folder..."
        ls -la docs/
        if [ -f "docs/rss.xml" ]; then
          echo "✅ rss.xml exists"
          head -20 docs/rss.xml
        else
          echo "⚠️ rss.xml not found - build may have failed"
        fi
        if [ -f "docs/feed.json" ]; then
          echo "✅ feed.json exists"
        else
          echo "⚠️ feed.json not found"
        fi
    
    - name: Setup Git config
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
    
    - name: Commit and push if changed
      run: |
        git add docs/
        if git diff --staged --quiet; then
          echo "📋 No changes to commit"
        else
          git commit -m "🔄 Auto-update articles - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
          echo "✅ Changes pushed successfully"
        fi
    
    - name: Report Success
      if: success()
      run: |
        echo "::notice::✅ Articles updated successfully!"
        echo "📊 RSS Feed: https://woodmont-industrial.github.io/Woodmont-Industrial-News-Briefing/rss.xml"
        echo "🌐 Web UI: https://woodmont-industrial.github.io/Woodmont-Industrial-News-Briefing/"
