name: Newsletter Pipeline (Build Only)

# Build-only pipeline — does NOT send email.
# Step 1: Scraper build → Step 2: Assess gaps → Step 3: RSS build → Commit
# Sending is handled separately by send-only.yml (scheduled after this completes).

on:
  schedule:
    # Fire every 15 min from 7-8 AM EST (11:00-12:00 UTC) Mon-Fri
    # Pipeline takes ~15-20 min. Finishing by 8-8:30 AM.
    # send-only.yml starts at 8:00 AM EST — 1 hour gap ensures build is done first.
    - cron: '0 11 * * 1-5'
    - cron: '15 11 * * 1-5'
    - cron: '30 11 * * 1-5'
    - cron: '45 11 * * 1-5'
    - cron: '0 12 * * 1-5'
  repository_dispatch:
    types: [build-feed]
  workflow_dispatch:
    inputs:
      skip_scrapers:
        description: 'Skip scraper step (faster, RSS only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  newsletter-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: newsletter-build
      cancel-in-progress: true

    steps:
      # === DEDUP CHECK — skip if build already succeeded today ===
      - name: Check for duplicate build
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if this pipeline already succeeded today (avoid redundant builds)
            try {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'newsletter-pipeline.yml',
                status: 'success',
                per_page: 1
              });
              if (runs.data.workflow_runs.length > 0) {
                const lastRun = new Date(runs.data.workflow_runs[0].created_at);
                const hoursAgo = (Date.now() - lastRun.getTime()) / (1000 * 60 * 60);
                if (hoursAgo < 2 && runs.data.workflow_runs[0].id !== context.runId) {
                  core.setOutput('skip', 'true');
                  console.log(`Skipping — build already succeeded ${hoursAgo.toFixed(1)} hours ago`);
                  return;
                }
              }
            } catch { /* continue */ }
            core.setOutput('skip', 'false');

      - name: Skip notice
        if: steps.dedup.outputs.skip == 'true'
        run: echo "⏭️ Build already completed recently — skipping."

      # === SETUP ===
      - name: Checkout repository
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install --prefer-offline --no-audit

      - name: Install Playwright browsers
        if: steps.dedup.outputs.skip != 'true' && inputs.skip_scrapers != 'true'
        run: npx playwright install chromium --with-deps

      # === STEP 1: SCRAPER BUILD ===
      - name: "Step 1: Run scrapers"
        id: scrapers
        if: steps.dedup.outputs.skip != 'true' && inputs.skip_scrapers != 'true'
        run: |
          echo "🕷️ Step 1: Running scrapers..."
          SKIP_RSS=true npm run build-static
          echo "✅ Scraper build complete"
        env:
          NODE_ENV: production
          SKIP_RSS: 'true'
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL: ${{ vars.CEREBRAS_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        timeout-minutes: 12

      # === STEP 2: ASSESS GAPS — auto-toggle GN backups ===
      - name: "Step 2: Assess scraper gaps and toggle GN backups"
        if: steps.dedup.outputs.skip != 'true'
        run: |
          echo "🔍 Step 2: Assessing scraper gaps..."
          npx tsx src/build/assess-gaps.ts
          echo "✅ Gap assessment complete"

      # === STEP 3: RSS BUILD (with GN backups now correctly set) ===
      - name: "Step 3: RSS build with correct GN backup state"
        if: steps.dedup.outputs.skip != 'true'
        run: |
          echo "📰 Step 3: Running RSS build..."
          SKIP_SCRAPERS=true npm run build-static
          echo "✅ RSS build complete"
        env:
          NODE_ENV: production
          SKIP_SCRAPERS: 'true'
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_MODEL: ${{ vars.CEREBRAS_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        timeout-minutes: 10

      # === COMMIT ===
      - name: Commit updated data
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ src/feeds/feeds.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 Feed build - $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              echo "Push failed (attempt $i), pulling with rebase..."
              git fetch origin main
              git rebase origin/main --strategy-option=ours || {
                git rebase --abort
                git pull --no-rebase -X ours || true
              }
            done
          fi

      - name: Report Success
        if: success() && steps.dedup.outputs.skip != 'true'
        run: |
          echo "✅ Feed build complete!"
          echo "📰 send-only.yml will handle sending at 8:00 AM EST"

      - name: Report Failure
        if: failure() && steps.dedup.outputs.skip != 'true'
        run: |
          echo "❌ Feed build failed!"
          echo "Check the logs above for error details"
