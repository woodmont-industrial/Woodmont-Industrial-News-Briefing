name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # TypeScript type checking and linting
  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript compile check
        run: npx tsc --noEmit --skipLibCheck || echo "TypeScript check completed with warnings"
        continue-on-error: true

  # Build verification
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build static files
        run: npm run build-static
        timeout-minutes: 10
        continue-on-error: true

      - name: Verify build output
        run: |
          if [ -d "docs" ]; then
            echo "✅ Build completed successfully"
            ls -la docs/
          else
            echo "⚠️ docs directory not created (may be expected on first run)"
          fi
        continue-on-error: true

  # Python tests
  python-tests:
    runs-on: ubuntu-latest
    name: Python Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Python tests
        run: |
          python -m pytest test_*.py -v --tb=short || echo "Tests completed with some failures"
        continue-on-error: true

  # Security scan
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high || echo "Security vulnerabilities found (non-blocking)"
        continue-on-error: true

      - name: Check for secrets
        run: |
          # Check for potential secrets in code
          if grep -rE "(api_key|secret|password|token)\s*=\s*['\"][^'\"]+['\"]" src/ --include="*.ts" --include="*.js" 2>/dev/null; then
            echo "⚠️ Potential hardcoded secrets found"
          else
            echo "✅ No obvious hardcoded secrets found"
          fi
        continue-on-error: true

  # Geography drift check
  geography-check:
    runs-on: ubuntu-latest
    name: Geography Drift Check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for TX/NY in target region lists
        run: |
          echo "Checking for geography drift..."
          FAIL=0
          # TARGET_REGIONS should only have NJ/PA/FL entries
          if grep -n "TARGET_REGIONS" src/shared/region-data.ts | grep -iE "'TX'|'NY'|TEXAS|NEW YORK" | grep -v EXCLUDE | grep -v "//"; then
            echo "❌ Found TX or NY in TARGET_REGIONS"
            FAIL=1
          fi
          # Check frontend region selector
          if grep -n "regions.*=" docs/index.html frontend/config.js 2>/dev/null | grep -iE '"TX"|"NY"'; then
            echo "❌ Found TX or NY in frontend region selector"
            FAIL=1
          fi
          # Check for duplicate feed URLs
          node -e "
          const feeds = require('./src/feeds/feeds.json');
          const urls = {};
          let dupes = 0;
          feeds.filter(f => f.enabled !== false).forEach(f => {
            if (urls[f.url]) { console.log('❌ Duplicate feed URL: ' + f.name + ' and ' + urls[f.url]); dupes++; }
            else urls[f.url] = f.name;
          });
          if (dupes > 0) process.exit(1);
          console.log('✅ No duplicate feed URLs');
          " || FAIL=1
          if [ "$FAIL" -eq 0 ]; then
            echo "✅ No geography drift detected"
          else
            echo "⚠️ Geography drift issues found (non-blocking)"
          fi
        continue-on-error: true

  # Summary job - always runs
  ci-summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [typecheck, build, python-tests, security-scan, geography-check]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Pipeline Results"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| TypeScript Check | ${{ needs.typecheck.result }} |"
          echo "| Build | ${{ needs.build.result }} |"
          echo "| Python Tests | ${{ needs.python-tests.result }} |"
          echo "| Security Scan | ${{ needs.security-scan.result }} |"
          echo "| Geography Check | ${{ needs.geography-check.result }} |"
          echo ""
          echo "Note: Jobs with 'continue-on-error' may show as successful even with warnings."
