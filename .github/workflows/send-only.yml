name: "Send: Newsletter Only"

# SEND ONLY — reads existing feed.json and sends newsletter.
# No scraping, no RSS fetching, no heavy builds.
# Completely separate from the build workflow. Safe, fast, no double-sends.

on:
  schedule:
    # Shotgun crons 8:00-8:45 AM EST (12:00-12:45 UTC) Mon-Fri
    # Build finishes by ~7:30 AM. Send starts at 8:00 AM.
    # 1 hour gap ensures build is done before send starts.
    - cron: '0 12 * * 1-5'
    - cron: '15 12 * * 1-5'
    - cron: '30 12 * * 1-5'
    - cron: '45 12 * * 1-5'
  repository_dispatch:
    types: [send-newsletter]
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass dedup guard'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: send-newsletter
      cancel-in-progress: false

    steps:
      # Dedup: check sent-articles.json FIRST
      - name: Check if already sent today
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            if ('${{ inputs.force_send }}' === 'true') {
              core.setOutput('skip', 'false');
              console.log('Force send — bypassing dedup');
              return;
            }
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/sent-articles.json'
              });
              const content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
              const today = new Date().toISOString().split('T')[0];
              const sentToday = (content.sent || []).some(s => s.sentAt === today);
              if (sentToday) {
                core.setOutput('skip', 'true');
                console.log('Already sent today — skipping');
                return;
              }
            } catch (e) {
              console.log('Could not check sent-articles.json: ' + e.message);
            }
            core.setOutput('skip', 'false');

      - name: Skip notice
        if: steps.dedup.outputs.skip == 'true'
        run: echo "⏭️ Newsletter already sent today."

      - name: Checkout
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install --prefer-offline --no-audit

      - name: Send newsletter
        if: steps.dedup.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          echo "📧 Sending newsletter..."
          npx tsx rssfeed.ts --send-newsletter-work

      - name: Commit sent-articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/sent-articles.json docs/feed.json docs/included-articles.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📧 Newsletter sent - $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if git push; then echo "Push OK"; break; fi
              git fetch origin main && git rebase origin/main --strategy-option=ours || { git rebase --abort; git pull --no-rebase -X ours || true; }
            done
          fi

      - name: Report
        if: success() && steps.dedup.outputs.skip != 'true'
        run: echo "✅ Newsletter sent!"
