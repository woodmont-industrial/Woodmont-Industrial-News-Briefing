name: "Send: Newsletter Only"

# SEND ONLY — reads existing feed.json and sends newsletter.
# No scraping, no RSS fetching, no heavy builds.
# Completely separate from the build workflow. Safe, fast, no double-sends.

on:
  schedule:
    # Shotgun crons 8:00-8:45 AM EST (12:00-12:45 UTC) Mon-Fri
    # Build finishes by ~7:30 AM. Send starts at 8:00 AM.
    # 1 hour gap ensures build is done before send starts.
    - cron: '0 12 * * 1-5'
    - cron: '15 12 * * 1-5'
    - cron: '30 12 * * 1-5'
    - cron: '45 12 * * 1-5'
  repository_dispatch:
    types: [send-newsletter]
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass dedup guard'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: send-newsletter
      cancel-in-progress: false

    steps:
      # Dedup: check sent-articles.json FIRST
      - name: Check if already sent today
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            if ('${{ inputs.force_send }}' === 'true') {
              core.setOutput('skip', 'false');
              console.log('Force send — bypassing dedup');
              return;
            }
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/sent-articles.json'
              });
              const content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
              const today = new Date().toISOString().split('T')[0];
              const sentToday = (content.sent || []).some(s => s.sentAt === today);
              if (sentToday) {
                core.setOutput('skip', 'true');
                console.log('Already sent today — skipping');
                return;
              }
            } catch (e) {
              console.log('Could not check sent-articles.json: ' + e.message);
            }
            core.setOutput('skip', 'false');

      - name: Skip notice
        if: steps.dedup.outputs.skip == 'true'
        run: echo "⏭️ Newsletter already sent today."

      - name: Checkout
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install --prefer-offline --no-audit

      - name: Send newsletter
        if: steps.dedup.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          echo "📧 Sending newsletter..."
          npx tsx rssfeed.ts --send-newsletter-work

      - name: Commit sent-articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/sent-articles.json docs/feed.json docs/included-articles.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📧 Newsletter sent - $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if git push; then echo "Push OK"; break; fi
              git fetch origin main && git rebase origin/main --strategy-option=ours || { git rebase --abort; git pull --no-rebase -X ours || true; }
            done
          fi

      # Also save today's top articles for Friday Week-in-Review
      - name: Save daily top articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          node -e "
          const fs = require('fs');
          const feed = JSON.parse(fs.readFileSync('docs/feed.json', 'utf-8'));
          const sent = JSON.parse(fs.readFileSync('docs/sent-articles.json', 'utf-8'));
          const today = new Date().toISOString().split('T')[0];
          const todayIds = new Set((sent.sent || []).filter(s => s.sentAt === today).map(s => s.id));
          const todaySent = feed.items.filter(i => todayIds.has(i.id));
          // Load or create weekly file
          let weekly = { week: {}, updatedAt: '' };
          try { weekly = JSON.parse(fs.readFileSync('docs/weekly-top-articles.json', 'utf-8')); } catch {}
          weekly.week[today] = todaySent.map(a => ({
            id: a.id, title: a.title, url: a.url, category: a.category,
            source: (a._source || {}).website || '',
            description: (a.content_text || a.summary || '').substring(0, 150),
            region: (a.tags || []).find(t => t.length <= 5) || ''
          }));
          // Keep only this week (last 5 weekdays)
          const keys = Object.keys(weekly.week).sort().reverse().slice(0, 5);
          const trimmed = {};
          keys.forEach(k => trimmed[k] = weekly.week[k]);
          weekly.week = trimmed;
          weekly.updatedAt = new Date().toISOString();
          fs.writeFileSync('docs/weekly-top-articles.json', JSON.stringify(weekly, null, 2));
          console.log('Saved ' + todaySent.length + ' articles for ' + today);
          "
          git add docs/weekly-top-articles.json
          git diff --staged --quiet || git commit -m "📊 Daily top articles - $(date -u +'%Y-%m-%d')" && git push || true

      # Update pipeline status on the website (no email, no webhook)
      - name: Update pipeline status
        if: steps.dedup.outputs.skip != 'true'
        run: |
          ARTICLE_COUNT=$(node -e "const s=JSON.parse(require('fs').readFileSync('docs/sent-articles.json','utf-8'));const t=s.sent.filter(x=>x.sentAt===new Date().toISOString().split('T')[0]).length;console.log(t)")
          node -e "
          const fs = require('fs');
          const status = {
            lastSent: new Date().toISOString(),
            date: new Date().toISOString().split('T')[0],
            articleCount: ${ARTICLE_COUNT},
            status: 'success',
            runId: '${{ github.run_id }}',
            runUrl: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          };
          fs.writeFileSync('docs/pipeline-status.json', JSON.stringify(status, null, 2));
          "
          git add docs/pipeline-status.json
          git diff --staged --quiet || git commit --amend --no-edit && git push --force-with-lease || true

      - name: Report
        if: success() && steps.dedup.outputs.skip != 'true'
        run: echo "✅ Newsletter sent!"
