name: "Send: Newsletter Only"

# SEND ONLY — reads existing feed.json and sends newsletter.
# No scraping, no RSS fetching, no heavy builds.
# Completely separate from the build workflow. Safe, fast, no double-sends.

on:
  schedule:
    # TARGET: ~8:30 AM ET delivery. GitHub delays scheduled crons ~2-4h, so the
    # cron fires EARLY at 10:00 UTC; +~2.5h typical lag => ~12:30 UTC = 8:30 AM EDT.
    # (Setting the cron literally to 8:30 ET would push delivery to ~11am-noon.)
    # This is NOT exact/"sharp" — GitHub drift gives a ~8:00-9:30 ET window. For a
    # true 8:30:00 send, use an external scheduler -> repository_dispatch (fires
    # with no lag; this workflow already accepts types: [send-newsletter]).
    # DST: cron is fixed UTC. When ET returns to EST (Nov 2026) bump +1h to 11:00
    # UTC so delivery stays ~8:30 ET.
    # Build pipeline fires 08:00-09:00 UTC (newsletter-pipeline.yml) — lands first.
    # 2026-06-25: bumped 10:00 -> 10:30 UTC. The 10:00 cron delivered 8:13 AM EDT
    # (only ~2h lag that day) — too early. 10:30 UTC + ~2h lag => ~12:30 UTC = 8:30
    # AM EDT, so it no longer lands before 8:30.
    - cron: '30 10 * * 1-5'
    - cron: '45 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '15 11 * * 1-5'
  repository_dispatch:
    types: [send-newsletter]
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass dedup guard'
        required: false
        type: boolean
        default: false
  # AUTO-RECOVERY: GitHub silently drops scheduled crons under load (esp. the Monday
  # after a holiday — 2026-07-06 the send cron never fired). The build pipeline still
  # runs reliably, so we also fire the send when the build COMPLETES. This means a
  # dropped cron self-heals with no human in the loop (the whole point when you're on
  # vacation). It CANNOT double-send: the dedup guard (sentAt===today) skips this run
  # if the cron already delivered. And the build has no `push` trigger, so the send's
  # own commits can never loop back into it.
  workflow_run:
    workflows: ["Newsletter Pipeline (Build Only)"]
    types: [completed]

permissions:
  contents: write

jobs:
  send:
    # On the auto-recovery path, only proceed if the build actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: send-newsletter
      cancel-in-progress: false

    steps:
      # Dedup: check sent-articles.json FIRST
      - name: Check if already sent today
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            if ('${{ inputs.force_send }}' === 'true') {
              core.setOutput('skip', 'false');
              console.log('Force send — bypassing dedup');
              return;
            }
            // Auto-recovery timing gate. The build completes in the MORNING (~08-09 UTC)
            // on a normal day, so firing the send on build-completion would deliver hours
            // before the 8:30 AM ET (12:30 UTC) target. Only let the workflow_run path send
            // once we're in the delivery window (>= 11:30 UTC). The days the scheduled cron
            // actually drops are laggy days where GitHub also delays the build (2026-07-06:
            // build ran 11:58-12:52 UTC), so on those days the build finishes late enough
            // for this gate to pass and recover the send. On normal days it defers to the cron.
            if (context.eventName === 'workflow_run') {
              const nowMin = new Date().getUTCHours() * 60 + new Date().getUTCMinutes();
              if (nowMin < 11 * 60 + 30) {
                core.setOutput('skip', 'true');
                console.log('Auto-recovery fired before 11:30 UTC delivery window — deferring to the scheduled cron.');
                return;
              }
              console.log('Auto-recovery in delivery window — will send if not already sent today.');
            }
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/sent-articles.json'
              });
              const content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
              const today = new Date().toISOString().split('T')[0];
              const sentToday = (content.sent || []).some(s => s.sentAt === today);
              if (sentToday) {
                core.setOutput('skip', 'true');
                console.log('Already sent today — skipping');
                return;
              }
            } catch (e) {
              console.log('Could not check sent-articles.json: ' + e.message);
            }
            core.setOutput('skip', 'false');

      - name: Skip notice
        if: steps.dedup.outputs.skip == 'true'
        run: echo "⏭️ Newsletter already sent today."

      - name: Checkout
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install --prefer-offline --no-audit

      - name: Send newsletter
        if: steps.dedup.outputs.skip != 'true'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_2 }}
          # Lets the quality scorer tell a human-dispatched send (automation failed,
          # -5) apart from a scheduled/auto-recovered one (timing penalty only).
          TRIGGER_EVENT: ${{ github.event_name }}
        run: |
          echo "📧 Sending newsletter..."
          npx tsx rssfeed.ts --send-newsletter-work

      - name: Commit sent-articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # quality-scores.{json,csv} are written by writeQualityHistory() during the
          # send; stage them so the Power BI trendline (quality-scores.csv) updates
          # each send. Without this the score lands only in docs/diagnostics/.
          git add docs/sent-articles.json docs/feed.json docs/included-articles.json docs/diagnostics/ docs/quality-scores.json docs/quality-scores.csv
          # -A so archive retention (deletions of >90-day snapshots) is committed too.
          git add -A docs/newsletter-archive/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📧 Newsletter sent - $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if git push; then echo "Push OK"; break; fi
              git fetch origin main && git rebase origin/main --strategy-option=ours || { git rebase --abort; git pull --no-rebase -X ours || true; }
            done
          fi

      # Also save today's top articles for Friday Week-in-Review
      - name: Save daily top articles
        if: steps.dedup.outputs.skip != 'true'
        run: |
          node -e "
          const fs = require('fs');
          const feed = JSON.parse(fs.readFileSync('docs/feed.json', 'utf-8'));
          const sent = JSON.parse(fs.readFileSync('docs/sent-articles.json', 'utf-8'));
          const today = new Date().toISOString().split('T')[0];
          const todayIds = new Set((sent.sent || []).filter(s => s.sentAt === today).map(s => s.id));
          const todaySent = feed.items.filter(i => todayIds.has(i.id));
          // Load or create weekly file
          let weekly = { week: {}, updatedAt: '' };
          try { weekly = JSON.parse(fs.readFileSync('docs/weekly-top-articles.json', 'utf-8')); } catch {}
          weekly.week[today] = todaySent.map(a => ({
            id: a.id, title: a.title, url: a.url, category: a.category,
            source: (a._source || {}).website || '',
            link: a.url || a.link || '',
            description: (a.content_text || a.description || a.summary || '').substring(0, 350),
            date_published: a.date_published || a.pubDate || today,
            region: (a.tags || []).find(t => t.length <= 5) || ''
          }));
          // Keep only this week (last 5 weekdays)
          const keys = Object.keys(weekly.week).sort().reverse().slice(0, 5);
          const trimmed = {};
          keys.forEach(k => trimmed[k] = weekly.week[k]);
          weekly.week = trimmed;
          weekly.updatedAt = new Date().toISOString();
          fs.writeFileSync('docs/weekly-top-articles.json', JSON.stringify(weekly, null, 2));
          console.log('Saved ' + todaySent.length + ' articles for ' + today);
          "
          git add docs/weekly-top-articles.json
          git diff --staged --quiet || git commit -m "📊 Daily top articles - $(date -u +'%Y-%m-%d')" && git push || true

      # Update pipeline status on the website (no email, no webhook)
      - name: Update pipeline status
        if: steps.dedup.outputs.skip != 'true'
        run: |
          ARTICLE_COUNT=$(node -e "const s=JSON.parse(require('fs').readFileSync('docs/sent-articles.json','utf-8'));const t=s.sent.filter(x=>x.sentAt===new Date().toISOString().split('T')[0]).length;console.log(t)")
          node -e "
          const fs = require('fs');
          const status = {
            lastSent: new Date().toISOString(),
            date: new Date().toISOString().split('T')[0],
            articleCount: ${ARTICLE_COUNT},
            status: 'success',
            runId: '${{ github.run_id }}',
            runUrl: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          };
          fs.writeFileSync('docs/pipeline-status.json', JSON.stringify(status, null, 2));
          "
          git add docs/pipeline-status.json
          git diff --staged --quiet || git commit --amend --no-edit && git push --force-with-lease || true

      - name: Report
        if: success() && steps.dedup.outputs.skip != 'true'
        run: echo "✅ Newsletter sent!"
